<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Translator - DeepL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --error: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.1);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a5b4fc, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Drag & Drop Area */
        .drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.01);
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.04);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .drop-zone-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }

        .drop-zone:hover .drop-zone-icon {
            transform: translateY(-5px);
        }

        .drop-zone-text {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .drop-zone-subtext {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        #file-input {
            display: none;
        }

        /* Controls */
        .controls-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .control-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        select:focus {
            border-color: var(--accent);
        }

        /* Button */
        .btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Loader */
        .loader-container {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 0 auto 0.75rem;
        }

        .loader-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Download Section */
        .download-container {
            display: none;
            margin-top: 1.5rem;
            animation: fadeIn 0.5s ease forwards;
        }

        .download-card {
            background: rgba(16, 185, 129, 0.05);
            border: 1px dashed var(--success);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--success);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Error Banner */
        .error-banner {
            display: none;
            margin-top: 1.5rem;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--error);
            border-radius: 12px;
            padding: 1rem;
            color: #fda4af;
            font-size: 0.9rem;
            text-align: center;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="app-title">Markdown Translator</h1>
            <p class="subtitle">DeepL APIを使用したマークダウン翻訳ツール</p>
        </header>

        <main>
            <!-- Drag & Drop Zone -->
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-icon">📂</div>
                <div class="drop-zone-text" id="drop-zone-prompt">ファイルをドラッグ＆ドロップ</div>
                <div class="drop-zone-subtext">またはここをクリックして選択 (.md のみ)</div>
                <input type="file" id="file-input" accept=".md">
            </div>

            <!-- Controls -->
            <div class="controls-group">
                <div class="control-item">
                    <label for="target-lang">翻訳先言語</label>
                    <select id="target-lang">
                        <option value="JA">日本語 (Japanese)</option>
                        <option value="EN-US">英語 [米国] (English - US)</option>
                        <option value="EN-GB">英語 [英国] (English - UK)</option>
                        <option value="ZH">中国語 (Chinese - Simplified)</option>
                        <option value="DE">ドイツ語 (German)</option>
                        <option value="FR">フランス語 (French)</option>
                        <option value="ES">スペイン語 (Spanish)</option>
                        <option value="KO">韓国語 (Korean)</option>
                    </select>
                </div>
            </div>

            <!-- Action Button -->
            <button id="translate-btn" class="btn" disabled>
                <span>翻訳を開始する</span>
            </button>

            <!-- Loader -->
            <div class="loader-container" id="loader">
                <div class="spinner"></div>
                <div class="loader-text">翻訳中... 数十秒かかる場合があります。</div>
            </div>

            <!-- Error Banner -->
            <div class="error-banner" id="error-banner"></div>

            <!-- Download link -->
            <div class="download-container" id="download-container">
                <div class="download-card">
                    <span style="color: var(--success); font-weight: 600;">✨ 翻訳が完了した！</span>
                    <a id="download-link" class="download-btn" href="#" download>
                        📥 翻訳ファイルをダウンロード
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="/static/front.js"></script>
</body>
</html>
